name: Build & Release

on:
  # 触发方式 1: 推送符合 V 开头的 tag 时自动构建（例如 git push --tags）
  push:
    tags:
      - 'V*'
      - 'v*'
  # 触发方式 2: 在 GitHub Releases 页面手动发布时构建
  release:
    types: [published]
  # 触发方式 3: 在 Actions 页面手动触发
  workflow_dispatch:
    inputs:
      version_tag:
        description: '版本标签 (例如 V4.2.1)'
        required: false
        default: ''

jobs:
  build:
    name: 构建打包程序
    runs-on: windows-latest

    steps:
      - name: 签出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装项目依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 读取版本号
        id: version
        shell: pwsh
        run: |
          # tag 触发时优先使用 tag 名，否则从文件读取
          if ("${{ github.event_name }}" -eq "push" -and "${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}"
          } else {
            $firstLine = Get-Content -Path "updates_notes.txt" -TotalCount 1
            if ($firstLine -match '^(V[\d.]+)') {
              $version = $matches[1]
            } else {
              $version = "Unknown"
            }
          }
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "版本: $version"

      - name: 执行 PyInstaller 打包
        shell: pwsh
        run: |
          python -m PyInstaller --noconfirm build_system/templates/excel_compare.spec
          echo "打包完成，dist 目录内容:"
          Get-ChildItem -Path "dist" -Name

      - name: 定位并打包构建产物
        id: zip
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $distDir = "dist"

          # 查找产物：排除 build 目录
          $items = Get-ChildItem -Path $distDir | Where-Object { $_.Name -ne "build" }
          if (-not $items) {
            Write-Error "未找到构建产物"
            exit 1
          }

          # 取最新的产物
          $artifact = $items | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          Write-Output "找到产物: $($artifact.Name) (目录: $($artifact.PSIsContainer))"

          # 压缩
          $zipName = "$version.zip"
          if ($artifact.PSIsContainer) {
            Compress-Archive -Path "$($artifact.FullName)\*" -DestinationPath $zipName
          } else {
            Compress-Archive -Path $artifact.FullName -DestinationPath $zipName
          }
          Write-Output "打包完成: $zipName ($((Get-Item $zipName).Length / 1MB -as [int]) MB)"
          echo "zipName=$zipName" >> $env:GITHUB_OUTPUT

      - name: 上传构建产物 (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.version }}
          path: ${{ steps.zip.outputs.zipName }}
          retention-days: 7

      - name: 创建/更新 Release 并上传产物
        if: github.event_name == 'release' || github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.zip.outputs.zipName }}
          generate_release_notes: true
          append_body: true
          body: |
            ## 📦 自动构建产物

            - **版本**: ${{ steps.version.outputs.version }}
            - **平台**: Windows (x64)
            - **触发方式**: ${{ github.event_name }}

            ### 使用说明
            1. 下载并解压 ZIP 包
            2. 运行 `ExcelCompareTool.exe`
            3. 如遇启动问题，请确保解压路径不包含中文

            > 此 Release 由 GitHub Actions 自动构建生成
