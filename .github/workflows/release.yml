name: Build & Release

on:
  # 触发方式 1: 推送符合 V 开头的 tag 时自动构建（例如 git push --tags）
  push:
    tags:
      - 'V*'
      - 'v*'
  # 触发方式 2: 在 GitHub Releases 页面手动发布时构建
  release:
    types: [published]
  # 触发方式 3: 在 Actions 页面手动触发
  workflow_dispatch:
    inputs:
      version_tag:
        description: '版本标签 (例如 V4.2.1)'
        required: false
        default: ''

jobs:
  build:
    name: 构建打包程序
    runs-on: windows-latest

    steps:
      - name: 签出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 读取版本号
        id: version
        shell: pwsh
        run: |
          # tag 触发时优先使用 tag 名，否则从文件读取
          if ("${{ github.event_name }}" -eq "push" -and "${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}"
          } else {
            $firstLine = Get-Content -Path "updates_notes.txt" -TotalCount 1
            if ($firstLine -match '^(V[\d.]+)') {
              $version = $matches[1]
            } else {
              $version = "Unknown"
            }
          }
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "version=$version"

      - name: 安装依赖
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas openpyxl
          echo "依赖 pandas/openpyxl 安装完成"

      - name: 安装 PyQt5
        shell: pwsh
        run: |
          # PyQt5 单独安装，便于定位问题
          python -m pip install PyQt5
          echo "PyQt5 安装完成"
          python -c "from PyQt5 import QtWidgets; print('PyQt5 导入验证通过')"

      - name: 安装 PyInstaller
        shell: pwsh
        run: |
          python -m pip install pyinstaller
          echo "PyInstaller 安装完成"

      - name: 执行 PyInstaller 打包
        shell: pwsh
        run: |
          # 动态生成 spec 内容，避免路径硬编码问题
          $specContent = @"
# -*- mode: python ; coding: utf-8 -*-
import os, sys
project_root = os.getcwd()
src_dir = os.path.join(project_root, "src")
if src_dir not in sys.path:
    sys.path.append(src_dir)
a = Analysis(
    ['main.py'],
    pathex=[project_root, src_dir],
    binaries=[],
    datas=[
        (os.path.join(project_root, "assets", "*"), "assets"),
        (os.path.join(project_root, "updates_notes.txt"), "."),
    ],
    hiddenimports=['pandas', 'openpyxl', 'PyQt5', 'PyQt5.QtCore', 'PyQt5.QtGui', 'PyQt5.QtWidgets'],
    hookspath=[],
    hooksconfig={},
    runtime_hooks=[],
    excludes=[],
    noarchive=False,
)
pyz = PYZ(a.pure)
exe = EXE(
    pyz,
    a.scripts,
    a.binaries,
    a.datas,
    [],
    name='ExcelCompareTool',
    debug=False,
    bootloader_ignore_signals=False,
    strip=False,
    upx=False,
    runtime_tmpdir=None,
    console=False,
    disable_windowed_traceback=False,
    argv_emulation=False,
    target_arch=None,
    codesign_identity=None,
    entitlements_file=None,
    icon=[os.path.join(project_root, "assets", "excel.ico")],
)
"@
          # 写入临时 spec 文件
          $specContent | Out-File -FilePath "build_temp.spec" -Encoding utf8
          
          # 执行 PyInstaller
          python -m PyInstaller --noconfirm build_temp.spec
          
          # 清理
          Remove-Item -Path "build_temp.spec" -Force -ErrorAction SilentlyContinue
          
          echo "打包完成"
          Write-Output "=== dist 目录内容 ==="
          Get-ChildItem -Path "dist" -Name
          Write-Output "=== 产物大小 ==="
          $distDir = "dist/ExcelCompareTool"
          if (Test-Path $distDir) {
            $size = (Get-ChildItem -Path $distDir -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB
            Write-Output "产物目录大小: $([math]::Round($size, 1)) MB"
          }

      - name: 定位并打包构建产物
        id: zip
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $distDir = "dist"

          # 查找产物：排除 build 目录
          $items = Get-ChildItem -Path $distDir | Where-Object { $_.Name -ne "build" }
          if (-not $items) {
            Write-Error "未找到构建产物"
            exit 1
          }

          # 取最新的产物
          $artifact = $items | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          Write-Output "找到产物: $($artifact.Name) (目录: $($artifact.PSIsContainer))"

          # 压缩
          $zipName = "$version.zip"
          if ($artifact.PSIsContainer) {
            Compress-Archive -Path "$($artifact.FullName)\*" -DestinationPath $zipName
          } else {
            Compress-Archive -Path $artifact.FullName -DestinationPath $zipName
          }
          Write-Output "打包完成: $zipName ($((Get-Item $zipName).Length / 1MB -as [int]) MB)"
          echo "zipName=$zipName" >> $env:GITHUB_OUTPUT

      - name: 上传构建产物 (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.version }}
          path: ${{ steps.zip.outputs.zipName }}
          retention-days: 7

      - name: 创建/更新 Release 并上传产物
        if: github.event_name == 'release' || github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.zip.outputs.zipName }}
          generate_release_notes: true
          append_body: true
          body: |
            ## 📦 自动构建产物

            - **版本**: ${{ steps.version.outputs.version }}
            - **平台**: Windows (x64)
            - **触发方式**: ${{ github.event_name }}

            ### 使用说明
            1. 下载并解压 ZIP 包
            2. 运行 `ExcelCompareTool.exe`
            3. 如遇启动问题，请确保解压路径不包含中文

            > 此 Release 由 GitHub Actions 自动构建生成
