name: Build & Release

on:
  # 触发方式 1: 推送符合 V 开头的 tag 时自动构建（例如 git push --tags）
  push:
    tags:
      - 'V*'
      - 'v*'
  # 触发方式 2: 在 GitHub Releases 页面手动发布时构建
  release:
    types: [published]
  # 触发方式 3: 在 Actions 页面手动触发
  workflow_dispatch:
    inputs:
      version_tag:
        description: '版本标签 (例如 V4.2.1)'
        required: false
        default: ''

jobs:
  build:
    name: 构建打包程序
    runs-on: windows-latest

    steps:
      - name: 签出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装项目依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 运行构建系统
        id: build
        shell: pwsh
        run: |
          # 使用项目的标准化打包框架进行构建
          python build_system/builder.py

          # 获取版本号: tag 触发时优先使用 tag 名，否则从文件读取
          $version = ""
          if ("${{ github.event_name }}" -eq "push" -and "${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}"
          } else {
            $firstLine = Get-Content -Path "updates_notes.txt" -TotalCount 1
            $version = if ($firstLine -match '^(V[\d.]+)') { $matches[1] } else { "Unknown" }
          }
          echo "version=$version" >> $env:GITHUB_OUTPUT

          # 获取 dist 目录中的输出
          $items = Get-ChildItem -Path "dist"
          echo "构建产物:"
          $items | ForEach-Object { Write-Output "  - $($_.Name)" }

      - name: 定位构建产物
        id: artifact
        shell: pwsh
        run: |
          # 查找 dist 中最新生成的产物 (可能是目录或 .exe 文件)
          $distItems = Get-ChildItem -Path "dist" | Where-Object {
            $_.Name -ne "build" -and $_.Name -notlike "*_temp*"
          } | Sort-Object LastWriteTime -Descending

          if (-not $distItems) {
            Write-Error "未找到构建产物"
            exit 1
          }

          $artifact = $distItems[0]
          echo "artifactName=$($artifact.Name)" >> $env:GITHUB_OUTPUT
          echo "artifactPath=$($artifact.FullName)" >> $env:GITHUB_OUTPUT
          echo "isDirectory=$($artifact.PSIsContainer)" >> $env:GITHUB_OUTPUT

      - name: 打包产物 (ZIP)
        id: zip
        shell: pwsh
        run: |
          $artifactPath = "${{ steps.artifact.outputs.artifactPath }}"
          $zipName = "${{ steps.build.outputs.version }}.zip"

          if ("${{ steps.artifact.outputs.isDirectory }}" -eq "True") {
            Compress-Archive -Path "$artifactPath\*" -DestinationPath "$zipName"
          } else {
            Compress-Archive -Path "$artifactPath" -DestinationPath "$zipName"
          }

          echo "zipName=$zipName" >> $env:GITHUB_OUTPUT
          echo "打包完成: $zipName"

      - name: 上传构建产物 (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build.outputs.version }}
          path: ${{ steps.zip.outputs.zipName }}
          retention-days: 7

      - name: 创建/更新 Release 并上传产物
        if: github.event_name == 'release' || github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.zip.outputs.zipName }}
          generate_release_notes: true
          append_body: true
          body: |
            ## 📦 自动构建产物

            - **版本**: ${{ steps.build.outputs.version }}
            - **平台**: Windows (x64)
            - **触发方式**: ${{ github.event_name }}

            ### 使用说明
            1. 下载并解压 ZIP 包
            2. 运行 `Excel差异比对工具*.exe`
            3. 确保解压路径不包含中文（如遇启动问题）
